# ============================================================
# Tower Defender — 机关配置
# ============================================================
# 设计文档: design/03-units.md §4
# 8种机关，放置在路径上或路径旁
# ============================================================

# 地刺 — 路径陷阱，对经过敌人造成持续伤害
spike_trap:
  id: spike_trap
  name: 地刺
  category: Trap
  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 40

  trap:
    type: SpikeTrap
    damagePerSecond: 3
    radius: 32
    cooldown: 0.2

  visual:
    shape: triangle
    color: "#757575"
    size: 60
    outline: false

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 捕兽夹 — 持久控制机关，触发后困住敌人2秒并进入5秒冷却，BOSS免疫
bear_trap:
  id: bear_trap
  name: 捕兽夹
  category: Trap
  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 50

  trap:
    type: BearTrap
    stunDuration: 2.0
    damage: 20
    cooldown: 5.0
    maxTriggers: 0
    bossImmune: true

  visual:
    shape: rect
    color: "#8d6e63"
    size: 60
    outline: false

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 焦油坑 — 路径减速，经过的地面敌人减速50%
tar_pit:
  id: tar_pit
  name: 焦油坑
  category: Trap
  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 45

  trap:
    type: TarPit
    slowPercent: 50
    radius: 32

  visual:
    shape: circle
    color: "#424242"
    size: 60
    outline: false

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 巨石 — 路障，阻挡敌人前进必须被破坏
boulder:
  id: boulder
  name: 巨石
  category: Trap
  faction: Player
  layer: Ground

  stats:
    hp: 200
    armor: 20
    mr: 0

  cost:
    build: 60

  trap:
    type: Boulder

  visual:
    shape: circle
    color: "#78909c"
    size: 60
    outline: false

  behavior:
    movementMode: hold_position

  lifecycle:
    onDeath:
      - type: play_effect
        effect: rock_shatter

---
