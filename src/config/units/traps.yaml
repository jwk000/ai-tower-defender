  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 45

  trap:
    type: TarPit
    slowPercent: 20
    radius: 32

  visual:
    shape: circle
    color: "#424242"
    size: 30

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 巨石 — 路障，阻挡敌人前进必须被破坏
boulder:
  id: boulder
  name: 巨石
  category: Trap
  faction: Player
  layer: Ground

  stats:
    hp: 200
    armor: 20
    mr: 0

  cost:
    build: 60

  trap:
    type: Boulder

  visual:
    shape: circle
    color: "#78909c"
    size: 40

  behavior:
    movementMode: hold_position

  lifecycle:
    onDeath:
      - type: play_effect
        effect: rock_shatter

