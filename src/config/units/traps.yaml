# ============================================================
# Tower Defender — 机关配置
# ============================================================
# 设计文档: design/03-units.md §4
# 8种机关，放置在路径上或路径旁
# ============================================================

# 地刺 — 路径陷阱，对经过敌人造成持续伤害
spike_trap:
  id: spike_trap
  name: 地刺
  category: Trap
  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 40

  trap:
    type: SpikeTrap
    damagePerSecond: 8
    radius: 32

  visual:
    shape: triangle
    color: "#757575"
    size: 28

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 捕兽夹 — 一次性陷阱，触发后困住敌人1秒，BOSS免疫
bear_trap:
  id: bear_trap
  name: 捕兽夹
  category: Trap
  faction: Player
  layer: AboveGrid

  stats:
    hp: 99999

  cost:
    build: 50

  trap:
    type: BearTrap
    rootDuration: 1.0
    maxTriggers: 1
    bossImmune: true

  visual:
    shape: rect
    color: "#8d6e63"
    size: 24

  behavior:
    movementMode: hold_position

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 焦油坑 — 路径减速，经过的地面敌人减速20%
tar_pit:
