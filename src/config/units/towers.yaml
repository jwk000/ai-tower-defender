# 激光塔 — 贯穿光束攻击塔
laser_tower:
  id: laser_tower
  name: 激光塔
  category: Tower
  faction: Player
  layer: Ground

  stats:
    hp: 150
    atk: 7
    attackSpeed: 0.5       # CD = 2s；激光束持续 5s，伤害 S 形递增（拐点 2.5s），上限 = 箭塔 atk × 3
    range: 250
    armor: 0
    mr: 0
    damageType: magic

  cost:
    build: 125
    upgrade: [55, 85, 130, 190]
    atkGrowth: [2, 3, 4, 5]
    rangeGrowth: [15, 15, 20, 20]

  visual:
    shape: rect
    color: "#00e5ff"
    size: 36
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: piercing
    movementMode: hold_position
    special:
      pierceDecay: 0.15

  lifecycle:
    onDeath:
      - type: play_effect
        effect: crystal_shatter
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_laser_beam
      - type: play_sound
        sound: SFX_LASER

