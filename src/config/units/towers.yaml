# ============================================================
# Tower Defender — 塔类配置（v3.5，7塔×Lv1/Lv2/Lv3）
# ============================================================
# 设计文档:
#   - design/20-units/21-unit-roster.md §2 塔阵容清单
#   - design/20-units/22a-skill-tree-tower.md  七塔科技树详设
#   - design/50-data-numerical/50-mda.md §4    塔类单位数值
#
# 每个升级等级是独立的 UnitConfig（id 不同），升级时实体替换为新 ID 的单位。
# Lv.1 = 获卡默认形态，Lv.2/Lv.3 = 关外金币升级解锁（由科技树系统驱动）。
# upgradesTo 字段供科技树系统查找下一等级单位 ID。
# ============================================================

# ────────────────────────────────────────────────
# 箭塔 Lv.1 — 基础单体物理远程
# ────────────────────────────────────────────────
arrow_tower:
  id: arrow_tower
  name: 箭塔
  category: Tower
  faction: Player
  layer: Ground
  upgradesTo: arrow_tower_lv2
  cardLevel: 1

  stats:
    hp: 100
    atk: 11
    attackSpeed: 1.0
    range: 200
    armor: 0
    mr: 0
    damageType: physical

  cost:
    build: 50

  visual:
    shape: rect
    color: "#4fc3f7"
    size: 36
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position

  lifecycle:
    onDeath:
      - type: leave_ruins
      - type: play_effect
        effect: destruction_particles
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: arrow
      - type: play_sound
        sound: SFX_ARROW_SHOOT

