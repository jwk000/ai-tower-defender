# ============================================================
# Tower Defender — 塔类配置
# ============================================================
# 设计文档: design/03-unit-data.md
# 架构: 配置驱动 — 修改此文件即可改变游戏行为
# ============================================================

# 箭塔 — 基础单体攻击塔
arrow_tower:
  id: arrow_tower
  name: 箭塔
  category: Tower
  faction: Player
  layer: Ground

  stats:
    hp: 1800
    atk: 10
    attackSpeed: 1.0
    range: 200
    armor: 0
    mr: 0
    damageType: physical

  cost:
    build: 70
    upgrade: [40, 360]
    atkGrowth: [5, 18]
    rangeGrowth: [20, 40]

  visual:
    shape: rect
    color: "#4fc3f7"
    size: 36
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position
    special:
      projectileCount: [1, 1, 2]

  lifecycle:
    onDeath:
      - type: leave_ruins
      - type: play_effect
        effect: destruction_particles
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: arrow
      - type: play_sound
        sound: tower_arrow

  passives:
    l3:
      id: precise_shot
      name: 精准射击
      description: 15%概率造成2倍暴击
      params:
        critChance: 0.15
        critMultiplier: 2.0

---
# 炮塔 — AOE溅射攻击塔
cannon_tower:
  id: cannon_tower
  name: 炮塔
  category: Tower
  faction: Player
  layer: Ground

  stats:
    hp: 2200
    atk: 25
    attackSpeed: 0.35
    range: 180
    armor: 0
    mr: 0
    damageType: physical

  cost:
    build: 115
    upgrade: [55, 620]
    atkGrowth: [10, 45]
    rangeGrowth: [0, 40]

  visual:
    shape: rect
    color: "#ff8a65"
    size: 38
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: aoe_splash
    movementMode: hold_position
    special:
      splashRadius: 80
      splashPercent: 0.6
      stunDuration: 0.8
      bossImmuneStun: true

  lifecycle:
    onDeath:
      - type: play_effect
        effect: explosion_orange
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: cannonball
      - type: play_sound
        sound: tower_cannon

  passives:
    l3:
      id: cluster_munition
      name: 集束弹药
      description: AOE半径+30%，溅射伤害提升至80%
      params:
        splashRadiusBonus: 1.3
        splashPercent: 0.8

---
# 冰塔 — 减速/冰冻控制塔
ice_tower:
  id: ice_tower
  name: 冰塔
  category: Tower
  faction: Player
  layer: Ground

  stats:
    hp: 1700
    atk: 5
    attackSpeed: 1.2
    range: 200
    armor: 0
    mr: 0
    damageType: magic

  cost:
    build: 70
    upgrade: [40, 380]
    atkGrowth: [3, 11]
    rangeGrowth: [20, 40]

  visual:
    shape: rect
    color: "#81d4fa"
    size: 34
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position
    special:
      slowPercent: 20
      slowMaxStacks: 5
      slowDuration: 3.0
      freezeDuration: 1.0

  lifecycle:
    onDeath:
      - type: play_effect
        effect: ice_shatter
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: ice_crystal
      - type: play_sound
        sound: tower_ice

  passives:
    l3:
      id: shatter
      name: 碎裂
      description: 冰冻结束时触发30伤害AOE
      params:
        shatterDamage: 30
        shatterRadius: 80

