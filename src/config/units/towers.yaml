# 蝙蝠塔 — 特殊条件激活塔
bat_tower:
  id: bat_tower
  name: 蝙蝠塔
  category: Tower
  faction: Player
  layer: LowAir

  stats:
    hp: 1600
    atk: 25
    attackSpeed: 0.75
    range: 200
    armor: 0
    mr: 0
    damageType: magic

  cost:
    build: 115
    upgrade: [65, 620]
    atkGrowth: [8, 38]
    rangeGrowth: [15, 35]

  visual:
    shape: rect
    color: "#7c4dff"
    size: 34
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position
    special:
      batCount: 3
      batCountByLevel: [3, 4, 7]
      batReplenishCD: 5.0
      batHP: 40
      batHPByLevel: [40, 50, 70]
      batDamage: 12
      batDamageByLevel: [12, 15, 25]
      batAttackRange: 80
      batAttackRangeByLevel: [80, 95, 115]
