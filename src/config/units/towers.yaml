  lifecycle:
    onDeath:
      - type: play_effect
        effect: bat_dissolve
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_bat_swarm
      - type: play_sound
        sound: tower_bat

