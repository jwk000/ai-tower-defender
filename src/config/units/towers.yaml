# 激光塔 — 贯穿光束攻击塔
laser_tower:
  id: laser_tower
  name: 激光塔
  category: Tower
  faction: Player
  layer: Ground

  stats:
    hp: 1500
    atk: 6
    attackSpeed: 0.5       # CD = 2s；同一座塔只能维持 1 束 5s 激光，伤害 S 形递增，上限 = 激光塔自身 atk
    range: 250
    armor: 0
    mr: 0
    damageType: magic

  cost:
    build: 125
    upgrade: [75, 520, 760, 1050]
    atkGrowth: [3, 10, 8, 10]
    rangeGrowth: [15, 20, 20, 20]

  visual:
    shape: rect
    color: "#00e5ff"
    size: 36
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position
    special:
      lockSingleBeam: true

  lifecycle:
    onDeath:
      - type: play_effect
        effect: crystal_shatter
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_laser_beam
      - type: play_sound
        sound: tower_laser

