# 法师 — 远程魔法AOE输出
mage:
  id: mage
  name: 法师
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 90
    atk: 16
    attackSpeed: 0.8
    range: 220
    speed: 15
    armor: 5
    mr: 20
    damageType: magic
    moveRange: 100

  cost:
    build: 40
    pop: 2

  visual:
    shape: rect
    color: "#9c27b0"
    size: 24
    outline: true
    symbol: cross

  visualParts:
    eyes:
      offsetX: 4
      offsetY: -3
      scleraRadius: 3
      scleraColor: "#ffffff"
      pupilRadius: 1.5
      pupilColor: "#4a148c"

  behavior:
    targetSelection: closest_to_crystal
    attackMode: aoe_splash
    movementMode: player_directed
    special:
      splashRadius: 40
      splashPercent: 1.0
      debuffId: arcane_vulnerability
      debuffAttribute: magicResist
      debuffValue: -0.2
      debuffDuration: 4
      debuffIsPercent: true
      periodicSpellCooldown: 6
      periodicSpellDamage: 36
      periodicSpellRadius: 90
      alertRange: 320

  skills:
    - id: arcane_blast
      name: 奥术爆破
      cooldown: 8
      energyCost: 20
      range: 200
      value: 40
      description: 攻击附加易伤负面Buff，并每6秒释放奥术爆破

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: magic_bolt
      - type: play_sound
        sound: SFX_MAGIC_SHOOT
