# ============================================================
# Tower Defender — 我方移动单位（士兵）配置（v3.5）
# ============================================================
# 设计文档:
#   - design/20-units/21-unit-roster.md §3 士兵阵容清单
#   - design/20-units/22b-skill-tree-soldier.md 士兵科技树详设
#   - design/50-data-numerical/50-mda.md §5 我方移动单位数值
#
# 士兵只有 Lv.1 基础配置（卡牌对应 Lv.1）。
# 升级效果通过 skillTree.nodes 的 goldCost 驱动，
# 不创建独立 Lv2/Lv3 UnitConfig，而是运行时叠加 effects[]。
# ============================================================

# ────────────────────────────────────────────────
# 盾卫 — 肉盾 + 嘲讽
# ────────────────────────────────────────────────
shield_guard:
  id: shield_guard
  name: 盾卫
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 350
    atk: 10
    attackSpeed: 0.8
    range: 50
    speed: 55
    armor: 50
    mr: 10
    damageType: physical
    population: 2

  cost:
    build: 55
    pop: 2

  visual:
    shape: rect
    color: "#4dd0e1"
    size: 32
    outline: true
    symbol: shield

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: taunt
      name: 嘲讽
      cooldown: 8
      range: 130
      value: 3
      description: 强制范围130px内敌人攻击自己，持续3秒

  skillTree:
    nodes:
      - id: shield_guard_lv1
        name: 盾卫 Lv.1
        level: 1
        goldCost: 0
        effects: []
      - id: shield_guard_lv2
        name: 盾卫 Lv.2
        level: 2
        goldCost: TBD
        effects:
          - rule: mul_skill_range
            skillId: taunt
            value: 1.5
          - rule: mul_max_hp
            value: 1.3
      - id: shield_guard_lv3
        name: 盾卫 Lv.3
        level: 3
        goldCost: TBD
        effects:
          - rule: add_skill_buff
            skillId: taunt
            buffId: damage_reduction_20
            duration: same_as_skill
          - rule: mul_max_hp
            value: 1.23
          - rule: add_cc_immunity
            effects: [knockback, stun]

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# ────────────────────────────────────────────────
# 剑士 — 前排输出 + 旋风斩
# ────────────────────────────────────────────────
swordsman:
  id: swordsman
  name: 剑士
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 180
    atk: 18
    attackSpeed: 1.0
    range: 55
    speed: 78
    armor: 15
    mr: 5
    damageType: physical
    population: 2

  cost:
    build: 55
    pop: 2

  visual:
    shape: rect
    color: "#e57373"
    size: 28
    outline: true
    symbol: cross

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: whirlwind
      name: 旋风斩
      cooldown: 6
      range: 80
      value: 35
      description: 对周围80px敌人造成35点AOE物理伤害

  skillTree:
    nodes:
      - id: swordsman_lv1
        name: 剑士 Lv.1
        level: 1
        goldCost: 0
        effects: []
      - id: swordsman_lv2
        name: 剑士 Lv.2
        level: 2
        goldCost: TBD
        effects:
          - rule: mul_skill_range
            skillId: whirlwind
            value: 1.4
          - rule: add_aoe_on_attack
            period: 2
            radius: 50
            damageRatio: 0.25
      - id: swordsman_lv3
        name: 剑士 Lv.3
        level: 3
        goldCost: TBD
        effects:
          - rule: add_skill_effect
            skillId: whirlwind
            effect: knockback
            distance: 30
          - rule: add_crit_chance
            probability: 0.15
            multiplier: 2.0

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: play_animation
        animation: whirlwind_spin

---
# ────────────────────────────────────────────────
# 弓手 — 远程 DPS + 狙击
# ────────────────────────────────────────────────
archer:
  id: archer
  name: 弓手
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 110
    atk: 22
    attackSpeed: 0.7
    range: 260
    speed: 68
    armor: 0
    mr: 0
    damageType: physical
    population: 2

  cost:
    build: 60
    pop: 2

  visual:
    shape: rect
    color: "#66bb6a"
    size: 26
    outline: true
    symbol: arrow

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: snipe
      name: 狙击
      cooldown: 10
      range: 420
      value: 3.0
      description: 超远程单体高伤害（ATK×3），射程420px

  skillTree:
    nodes:
      - id: archer_lv1
        name: 弓手 Lv.1
        level: 1
        goldCost: 0
        effects: []
      - id: archer_lv2
        name: 弓手 Lv.2
        level: 2
        goldCost: TBD
        effects:
          - rule: mul_skill_damage
            skillId: snipe
            value: 1.5
          - rule: mul_attack_interval
            value: 0.7
          - rule: mul_atk
            value: 0.85
      - id: archer_lv3
        name: 弓手 Lv.3
        level: 3
        goldCost: TBD
        effects:
          - rule: add_skill_execute
            skillId: snipe
            hpThreshold: 0.3
          - rule: add_aoe_on_attack
            period: 5
            radius: 80
            damageRatio: 0.6

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: spawn_projectile
        projectile: arrow_long

---
# ────────────────────────────────────────────────
# 祭司 — 治疗支援 + 治疗链
# ────────────────────────────────────────────────
priest:
  id: priest
  name: 祭司
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 85
    atk: 0
    speed: 50
    armor: 5
    mr: 25
    healAmount: 10
    healRange: 160
    population: 2

  cost:
    build: 55
    pop: 2

  visual:
    shape: rect
    color: "#eeeeee"
    size: 24
    outline: true
    symbol: cross

  behavior:
    targetSelection: nearest
    attackMode: heal
    movementMode: player_directed

  skills:
    - id: heal_chain
      name: 治疗链
      cooldown: 5
      range: 160
      value: 5.0
      description: 对周围160px友军持续回血（治疗链）

  skillTree:
    nodes:
      - id: priest_lv1
        name: 牧师 Lv.1
        level: 1
        goldCost: 0
        effects: []
      - id: priest_lv2
        name: 牧师 Lv.2
        level: 2
        goldCost: TBD
        effects:
          - rule: add_skill_chain
            skillId: heal_chain
            value: 1
          - rule: add_attack_heal
            friendlyHealRatio: 0.3
      - id: priest_lv3
        name: 牧师 Lv.3
        level: 3
        goldCost: TBD
        effects:
          - rule: add_skill_bonus_heal
            skillId: heal_chain
            ratio: 0.05
          - rule: add_skill_damage_mode
            skillId: heal_chain
            enemyDamageRatio: 0.8

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

