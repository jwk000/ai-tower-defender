# ============================================================
# Tower Defender — 我方移动单位（士兵）配置
# ============================================================
# 设计文档: design/03-unit-data.md

# 盾卫 — 坦克/嘲讽
shield_guard:
  id: shield_guard
  name: 盾卫
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 520
    atk: 4
    attackSpeed: 0.55
    range: 50
    speed: 30
    armor: 70
    mr: 25
    damageType: physical
    moveRange: 100

  cost:
    build: 35
    pop: 2

  visual:
    shape: circle
    color: "#4dd0e1"
    size: 30
    outline: true

  visualParts:
    eyes:
      offsetX: 5
      offsetY: -4
      scleraRadius: 4
      scleraColor: "#ffffff"
      pupilRadius: 2
      pupilColor: "#1a237e"

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: taunt
      name: 嘲讽
      cooldown: 8
      energyCost: 20
      range: 120
      value: 0
      buffId: taunt_buff
      description: 强制周围敌人攻击自己，持续3秒

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

