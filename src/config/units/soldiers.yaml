# ────────────────────────────────────────────────
# 刺客 — 近战爆发 + 暗杀
# ────────────────────────────────────────────────
assassin:
  id: assassin
  name: 刺客
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 65
    atk: 28
    attackSpeed: 1.3
    range: 40
    speed: 105
    armor: 0
    mr: 0
    damageType: physical
    population: 3

  cost:
    build: 70
    pop: 3

  visual:
    shape: rect
    color: "#ab47bc"
    size: 22
    outline: true
    symbol: blade

  behavior:
    targetSelection: weakest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: assassinate
      name: 暗杀
      cooldown: 10
      range: 280
      value: 3.0
      description: 瞬移280px到最弱敌人旁，造成ATK×3高伤害

  skillTree:
    nodes:
      - id: assassin_lv1
        name: 刺客 Lv.1
        level: 1
        goldCost: 0
        effects: []
      - id: assassin_lv2
        name: 刺客 Lv.2
        level: 2
        goldCost: TBD
        effects:
          - rule: mul_skill_cooldown
            skillId: assassinate
            value: 0.7
          - rule: add_poison_on_hit
            duration: 3.0
            tickRatio: 0.2
      - id: assassin_lv3
        name: 刺客 Lv.3
        level: 3
        goldCost: TBD
        effects:
          - rule: add_skill_reset_on_kill
            skillId: assassinate
          - rule: add_heal_on_poison_kill
            healRatio: 0.2

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: teleport_effect
      - type: play_animation
        animation: slash_cross
