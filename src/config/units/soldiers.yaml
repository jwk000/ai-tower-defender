# 刺客 — 高机动/暗杀
assassin:
  id: assassin
  name: 刺客
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 60
    atk: 55
    attackSpeed: 1.8
    range: 40
    speed: 75
    armor: 0
    mr: 0
    damageType: physical
    moveRange: 100

  cost:
    build: 45
    pop: 3

  visual:
    shape: circle
    color: "#ab47bc"
    size: 22
    outline: true

  visualParts:
    eyes:
      offsetX: 3
      offsetY: -2
      scleraRadius: 2.5
      scleraColor: "#ffffff"
      pupilRadius: 1.2
      pupilColor: "#4a148c"

  behavior:
    targetSelection: weakest
    attackMode: single_target
    movementMode: player_directed
    special:
      executeThreshold: 0.1
      executeNormalOnly: true
      teleportOnExecute: true
      alertRange: 320

  skills:
    - id: assassinate
      name: 暗杀
      cooldown: 8
      energyCost: 30
      range: 300
      value: 3.0
      description: 瞬移到血量低于10%的普通敌人旁并处决，否则进行高伤害刺杀

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: teleport_effect
      - type: play_animation
        animation: slash_cross

