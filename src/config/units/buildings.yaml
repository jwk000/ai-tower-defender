# 金矿 Lv1 — 2.5G/s，造价 85G
gold_mine:
  id: gold_mine
  name: 金矿
  category: Building
  faction: Player
  layer: Ground
  upgradesTo: gold_mine_lv2

  stats:
    hp: 80

  cost:
    build: 85

  production:
    resourceType: gold
    rate: 2.5

  visual:
    shape: rect
    color: "#ffd54f"
    size: 28
    outline: true

  behavior:
    movementMode: hold_position

  lifecycle:
    onDeath:
      - type: play_effect
        effect: destruction_particles
    onUpgrade:
      - type: play_effect
        effect: upgrade_gold
      - type: play_sound
        sound: SFX_UPGRADE

