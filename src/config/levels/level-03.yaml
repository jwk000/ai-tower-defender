# ============================================================
# 第3关：黑暗古堡
# 路径布局：Y型双路汇聚（上下对称合流于中心）
# 出生口：右上(行2,列20) + 右下(行6,列20) | 水晶：中左(行4,列0)
# 上路径：行2左→列10下→行4左→水晶
# 下路径：行6左→列10上→行4左→水晶
# 对称轴：行4（上下完全对称Y形）
# 每个出生口每波均有精英怪
# ============================================================
id: level_03
name: 黑暗古堡
theme: castle
description: 森林古堡，暗夜笼罩

map:
  cols: 21
  rows: 9
  tileSize: 64
  tiles:
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [base, path, path, path, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#9e9e9e'
    path: '#616161'
    blocked: '#212121'
    spawn: '#b8940a'
    base: '#3288cc'
  obstacles:
    - { type: pillar, row: 0, col: 2 }
    - { type: pillar, row: 0, col: 10 }
    - { type: pillar, row: 0, col: 18 }
    - { type: pillar, row: 6, col: 5 }
    - { type: pillar, row: 8, col: 10 }
    - { type: brazier, row: 1, col: 2 }
    - { type: brazier, row: 2, col: 1 }
    - { type: brazier, row: 5, col: 18 }
    - { type: brazier, row: 6, col: 17 }
    - { type: brazier, row: 7, col: 17 }
    - { type: rubble, row: 2, col: 17 }
    - { type: rubble, row: 3, col: 16 }
    - { type: rubble, row: 5, col: 1 }
    - { type: rubble, row: 8, col: 3 }
    - { type: dead_tree, row: 0, col: 15 }
    - { type: dead_tree, row: 4, col: 12 }
    - { type: dead_tree, row: 8, col: 7 }
    - { type: dead_tree, row: 8, col: 18 }
  spawns:
    - id: spawn_0
      row: 2
      col: 20
    - id: spawn_1
      row: 6
      col: 20
  pathGraph:
    nodes:
      - { id: n0, row: 2, col: 20, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 2, col: 10, role: waypoint }
      - { id: n2, row: 4, col: 10, role: waypoint }
      - { id: n3, row: 6, col: 20, role: spawn, spawnId: spawn_1 }
      - { id: n4, row: 6, col: 10, role: waypoint }
      - { id: n5, row: 4, col: 0, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }
      - { from: n1, to: n2 }
      - { from: n3, to: n4 }
      - { from: n4, to: n2 }
      - { from: n2, to: n5 }
  lighting:
    fogOverlay:
      enabled: true

weather:
  pool:
    - Night
  initial: Night

crystal:
  hp: 900

starting:
  gold: 290
  energy: 50
  maxPopulation: 10

available:
  towers:
    - arrow
    - laser
    - bat
  units:
    - shield_guard
    - mage
    - priest

waves:
  # 波次1: 上口(狼人×3+蝙蝠精英×2) | 下口(狼人×3+蝙蝠精英×2)
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.5, spawnId: spawn_1 }
    reward: 45
  # 波次2: 上口(狼人×3+巫师精英×2) | 下口(狼人×3+蝙蝠精英×3)
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.0, spawnId: spawn_1 }
    reward: 60
  # 波次3: 上口(狼人×3+蝙蝠精英×2+巫师精英×1) | 下口(狼人×3+蝙蝠精英×2+牧师精英×1)
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 1, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: dark_priest, count: 1, spawnInterval: 2.5, spawnId: spawn_1 }
    reward: 75
  # 波次4: 上口(狼人×3+巫师精英×2+牧师精英×1) | 下口(狼人×3+蝙蝠精英×2+巫师精英×2)
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: dark_priest, count: 1, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.5, spawnId: spawn_1 }
    reward: 90
  # 波次5: 上口(狼人×3+蝙蝠精英×2+弗兰肯精英×1) | 下口(狼人×3+巫师精英×2+牧师精英×2)
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: vampire_bat, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: frankenstein, count: 1, spawnInterval: 3.0, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.5, spawnId: spawn_1 }
      - { enemyType: dark_priest, count: 1, spawnInterval: 2.5, spawnId: spawn_1 }
    reward: 110
  # 波次6: 上口(狼人×3+巫师精英×2+牧师精英×1) | 下口(狼人×3+蝙蝠精英×2+弗兰肯精英×1)
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: dark_priest, count: 1, spawnInterval: 2.5, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: frankenstein, count: 1, spawnInterval: 3.0, spawnId: spawn_1 }
    reward: 125
  # 波次7: 上口(BOSS路西法+蝙蝠精英×3) | 下口(狼人×4+巫师精英×2+牧师精英×1)
  - waveNumber: 7
    spawnDelay: 30
    enemies:
      - { enemyType: lucifer, count: 1, spawnInterval: 0, spawnId: spawn_0 }
      - { enemyType: vampire_bat, count: 3, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 4, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: dark_priest, count: 1, spawnInterval: 2.5, spawnId: spawn_1 }
    isBossWave: true
    reward: 180

