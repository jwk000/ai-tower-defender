    - mage
    - priest

waves:
  # 波次1: 狼人×6
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: werewolf, count: 6, spawnInterval: 2.0 }
    reward: 30
  # 波次2: 狼人×5 + 蝙蝠×5
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 5, spawnInterval: 2.0 }
      - { enemyType: vampire_bat, count: 5, spawnInterval: 2.0 }
    reward: 40
  # 波次3: 狼人×4 + 蝙蝠×4 + 巫师×2
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 4, spawnInterval: 2.0 }
      - { enemyType: vampire_bat, count: 4, spawnInterval: 2.0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.0 }
    reward: 50
  # 波次4: 狼人×4 + 蝙蝠×3 + 巫师×2 + 牧师×1
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 4, spawnInterval: 2.0 }
      - { enemyType: vampire_bat, count: 3, spawnInterval: 2.0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.0 }
      - { enemyType: priest, count: 1, spawnInterval: 2.0 }
    reward: 60
  # 波次5: 狼人×3 + 蝙蝠×3 + 巫师×2 + 牧师×1 + 弗兰肯斯坦×1
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 3, spawnInterval: 2.5 }
      - { enemyType: vampire_bat, count: 3, spawnInterval: 2.5 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.5 }
      - { enemyType: priest, count: 1, spawnInterval: 2.5 }
      - { enemyType: frankenstein, count: 1, spawnInterval: 2.5 }
    reward: 70
  # 波次6: 狼人×5 + 蝙蝠×4 + 巫师×3 + 牧师×2
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: werewolf, count: 5, spawnInterval: 2.0 }
      - { enemyType: vampire_bat, count: 4, spawnInterval: 2.0 }
      - { enemyType: wizard, count: 3, spawnInterval: 2.0 }
      - { enemyType: priest, count: 2, spawnInterval: 2.0 }
    reward: 80
  # 波次7: BOSS + 狼人×3 + 牧师×2
  - waveNumber: 7
    spawnDelay: 30
    enemies:
      - { enemyType: lucifer, count: 1, spawnInterval: 0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 2.0 }
      - { enemyType: priest, count: 2, spawnInterval: 2.0 }
    isBossWave: true
    reward: 120

