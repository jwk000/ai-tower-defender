# ============================================================
# 第5关：深渊裂隙
# design/04-levels.md §6
# ============================================================
id: level_05
name: 深渊裂隙
description: 深渊地下，终极挑战

map:
  cols: 21
  rows: 9
  tileSize: 64
  tiles:
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#1a0033'
    path: '#311b92'
    blocked: '#0d0019'
    spawn: '#aa00ff'
    base: '#ffd54f'
  obstacles:
    - { type: floating_rock, row: 0, col: 10 }
    - { type: purple_flame, row: 2, col: 5 }
    - { type: crystal, row: 4, col: 15 }
    - { type: crystal, row: 6, col: 8 }
  spawns:
    - id: spawn_0
      row: 1
      col: 0
    - id: spawn_1
      row: 3
      col: 0
    - id: spawn_2
      row: 5
      col: 0
  pathGraph:
    nodes:
      - { id: n0, row: 1, col: 0, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 1, col: 20, role: crystal_anchor }
      - { id: n2, row: 3, col: 0, role: spawn, spawnId: spawn_1 }
      - { id: n3, row: 3, col: 20, role: crystal_anchor }
      - { id: n4, row: 5, col: 0, role: spawn, spawnId: spawn_2 }
      - { id: n5, row: 5, col: 20, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }
      - { from: n2, to: n3 }
      - { from: n4, to: n5 }

weather:
  pool:
    - Night
  initial: Night

crystal:
  hp: 1500

starting:
  gold: 400
  energy: 50
  maxPopulation: 15

available:
  towers:
    - arrow
    - ballista
    - cannon
    - laser
    - bat
    - missile
    - ice
    - fire
    - poison
    - lightning
  units:
    - shield_guard
    - archer
    - mage
    - priest

waves:
  # 波次1: 哥布林×6 + 黑虫×8（2出生点）
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: goblin, count: 6, spawnInterval: 1.5, spawnId: spawn_0 }
      - { enemyType: desert_beetle, count: 8, spawnInterval: 1.5, spawnId: spawn_1 }
    reward: 40
  # 波次2: 野猪×4 + 钻地甲虫×3 + 狼人×3（2出生点）
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: boar, count: 4, spawnInterval: 1.5, spawnId: spawn_0 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 1.5, spawnId: spawn_1 }
      - { enemyType: werewolf, count: 3, spawnInterval: 1.5, spawnId: spawn_0 }
    reward: 50
  # 波次3: 大象×2 + 蝗虫×5 + 蝙蝠×5（2出生点）
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: elephant, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: locust, count: 5, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: vampire_bat, count: 5, spawnInterval: 2.0, spawnId: spawn_1 }
    reward: 60
  # 波次4: 巨人×2 + 巫师×3 + 机器狗×6（3出生点）
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: giant, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: robot_dog, count: 6, spawnInterval: 2.0, spawnId: spawn_2 }
    reward: 70
  # 波次5: BOSS: 巨型史莱姆 + 黑虫×6
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: giant_slime, count: 1, spawnInterval: 0, spawnId: spawn_0 }
      - { enemyType: desert_beetle, count: 6, spawnInterval: 2.0, spawnId: spawn_1 }
    isBossWave: true
    reward: 100
  # 波次6: 自爆甲虫×4 + 牧师×2 + 无人机×5 + 弗兰肯斯坦×1（3出生点）
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: bomb_beetle, count: 4, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: priest, count: 2, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: drone, count: 5, spawnInterval: 2.0, spawnId: spawn_2 }
      - { enemyType: frankenstein, count: 1, spawnInterval: 2.0, spawnId: spawn_1 }
    reward: 80
  # 波次7: BOSS: 虫族女王 + 蝗虫×8
  - waveNumber: 7
    spawnDelay: 30
    enemies:
      - { enemyType: queen_beetle, count: 1, spawnInterval: 0, spawnId: spawn_1 }
      - { enemyType: locust, count: 8, spawnInterval: 2.0, spawnId: spawn_0 }
    isBossWave: true
    reward: 120
  # 波次8: 坦克×2 + 飞机×3 + 油罐车×3 + 巨型机器人×1（3出生点）
  - waveNumber: 8
    spawnDelay: 30
    enemies:
      - { enemyType: tank, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: plane, count: 3, spawnInterval: 2.0, spawnId: spawn_1 }
      - { enemyType: oil_truck, count: 3, spawnInterval: 2.0, spawnId: spawn_2 }
      - { enemyType: giant_robot, count: 1, spawnInterval: 2.0, spawnId: spawn_0 }
    reward: 90
  # 波次9: BOSS: 路西法 + 狼人×4 + 巫师×2
  - waveNumber: 9
    spawnDelay: 30
    enemies:
      - { enemyType: lucifer, count: 1, spawnInterval: 0, spawnId: spawn_1 }
      - { enemyType: werewolf, count: 4, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: wizard, count: 2, spawnInterval: 2.0, spawnId: spawn_2 }
    isBossWave: true
    reward: 140
  # 波次10: 所有普通敌人混编×15（3出生点，密集）
  - waveNumber: 10
    spawnDelay: 30
    enemies:
      - { enemyType: goblin, count: 3, spawnInterval: 1.0, spawnId: spawn_0 }
      - { enemyType: werewolf, count: 3, spawnInterval: 1.0, spawnId: spawn_0 }
      - { enemyType: robot_dog, count: 3, spawnInterval: 1.0, spawnId: spawn_2 }
      - { enemyType: desert_beetle, count: 3, spawnInterval: 1.0, spawnId: spawn_1 }
      - { enemyType: tank, count: 3, spawnInterval: 1.0, spawnId: spawn_2 }
    reward: 100
  # 波次11: BOSS: 超级机器人 + 坦克×2 + 无人机×6
  - waveNumber: 11
    spawnDelay: 30
    enemies:
      - { enemyType: super_robot, count: 1, spawnInterval: 0, spawnId: spawn_2 }
      - { enemyType: tank, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: drone, count: 6, spawnInterval: 2.0, spawnId: spawn_1 }
    isBossWave: true
    reward: 160
  # 波次12: BOSS: 深渊领主 + 随机敌人×8
  - waveNumber: 12
    spawnDelay: 30
    enemies:
      - { enemyType: abyss_lord, count: 1, spawnInterval: 0, spawnId: spawn_1 }
      - { enemyType: giant, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: frankenstein, count: 2, spawnInterval: 2.0, spawnId: spawn_0 }
      - { enemyType: giant_robot, count: 2, spawnInterval: 2.0, spawnId: spawn_2 }
      - { enemyType: tank, count: 2, spawnInterval: 2.0, spawnId: spawn_2 }
    isBossWave: true
    reward: 250

