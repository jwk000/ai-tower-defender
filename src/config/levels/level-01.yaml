    - { type: flower, row: 6, col: 18 }
    - { type: flower, row: 7, col: 11 }
    - { type: flower, row: 8, col: 18 }
  spawns:
    - id: spawn_0
      row: 4
      col: 20
  pathGraph:
    nodes:
      - { id: n0, row: 4, col: 20, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 4, col: 0, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }

weather:
  pool:
    - Rain
  initial: Rain

crystal:
  hp: 500

starting:
  gold: 170
  energy: 50
  maxPopulation: 6

available:
  towers:
    - arrow
    - ice
  units:
    - shield_guard
    - archer

waves:
  # 波次1: 哥布林×8
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: goblin, count: 8, spawnInterval: 1.5 }
    reward: 25
  # 波次2: 哥布林×6 + 野猪×3
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: goblin, count: 6, spawnInterval: 1.5 }
      - { enemyType: boar, count: 3, spawnInterval: 1.5 }
    reward: 40
  # 波次3: 哥布林×5 + 野猪×3 + 大象×2
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: goblin, count: 5, spawnInterval: 2.0 }
      - { enemyType: boar, count: 3, spawnInterval: 2.0 }
      - { enemyType: elephant, count: 1, spawnInterval: 2.0 }
    reward: 60
  # 波次4: 野猪×4 + 大象×2 + 巨人×2
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: boar, count: 4, spawnInterval: 2.0 }
      - { enemyType: elephant, count: 2, spawnInterval: 2.0 }
      - { enemyType: giant, count: 1, spawnInterval: 2.0 }
    reward: 75
  # 波次5: BOSS + 哥布林×4 + 野猪×2
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: giant_slime, count: 1, spawnInterval: 0 }
      - { enemyType: goblin, count: 3, spawnInterval: 2.0 }
      - { enemyType: boar, count: 1, spawnInterval: 2.0 }
    isBossWave: true
    reward: 110

cardPool:
  - card_arrow_tower
  - card_ice_tower
  - card_shield_guard
  - card_archer
  - card_spike_trap
  - card_bear_trap
  - card_fireball

draftPool:
  - card_arrow_tower
  - card_ice_tower
  - card_cannon_tower
  - card_shield_guard
  - card_archer
  - card_mage
  - card_spike_trap
  - card_bear_trap
  - card_tar_pit
  - card_boulder
  - card_fireball
  - card_arrow_rain

banPool: []
neutralPool: []

# ============================================================
# v6.0: 过关界面配置
# ============================================================
victory:
  story:
    title: 雨后初晴
    paragraphs:
      - "翠绿草原上的雨水渐渐停歇，阳光穿透云层洒在水晶上。"
      - "哥布林部落仓皇逃窜，巨型史莱姆化作一滩无害的黏液。"
      - "你守住了第一道防线，但远处沙漠的风沙已经扬起——真正的考验才刚刚开始。"
    summary: 草原已平，沙漠风沙扬起。
    showFullStoryOnlyFirst: true
  background:
    filter: rain_to_sunny
    gradient:
      top: "#2d5a1e"
      mid: "#4a8c3f"
      bottom: "#1a3a12"
    particles:
      - { type: sparkle, color: "#ffd700", density: 20, speed: 0.5 }
      - { type: sparkle, color: "#90ee90", density: 30, speed: 0.3 }
  confetti:
    count: 80
    burst: top_fall
    colors:
      - ["#90ee90", "#228b22", "#ffd700", "#ffffff"]
    shapes:
      ribbon: 0.5
      petal: 0.35
      sparkle: 0.15
    duration: 3.0
    spread: 0.8
  audio:
    bgm: bgm/victory_meadow.ogg
    sfx: sfx/victory_meadow.ogg
  typography:
    titleColor:
      - "#ffd700"
      - "#90ee90"
    panelBg: "rgba(10, 30, 18, 0.85)"
    panelBorder: "#4a8c3f"
    storyColor: "#e7ffd8"
    accentColor: "#9bd66f"

# ============================================================
# v6.0: 失败界面故事
# ============================================================
defeat:
  story:
    title: 草原沦陷
    paragraphs:
      - "水晶在巨兽的冲击下碎裂，翠绿草原上最后一道防线崩溃了。"
      - "哥布林的嘲笑声回荡在雨中，这片土地暂时落入了黑暗之手。"
      - "但希望从未熄灭——下一次，你会更强大。"
