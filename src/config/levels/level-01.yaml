    - { type: tree, row: 0, col: 17 }
    - { type: tree, row: 1, col: 6 }
    - { type: tree, row: 2, col: 13 }
    - { type: tree, row: 3, col: 3 }
    - { type: tree, row: 3, col: 18 }
    - { type: tree, row: 5, col: 6 }
    - { type: tree, row: 6, col: 8 }
    - { type: tree, row: 7, col: 17 }
    - { type: tree, row: 8, col: 5 }
    - { type: tree, row: 8, col: 16 }
