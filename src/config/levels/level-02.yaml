# ============================================================
# 第2关：沙漠虫潮
# 路径布局：水平S形蛇行
# 出生口：右侧(行1,列20) | 水晶：左下(行7,列0)
# 路径：右→左(行1) → 下(列14) → 右(行3) → 下(列6) → 左(行5) → 下(列14) → 左(行7)
# 每波含精英怪(burrow_beetle/locust/bomb_beetle)
# ============================================================
id: level_02
name: 沙漠虫潮
theme: desert
description: 黄色沙漠，虫族入侵

map:
  cols: 21
  rows: 9
  tileSize: 64
  tiles:
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, path, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, empty]
