id: level_02
name: 沙漠虫潮
description: 黄色沙漠，虫族入侵

map:
  cols: 21
  rows: 9
  tileSize: 64
  tiles:
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#e6c44d'
    path: '#bfa045'
    blocked: '#795548'
    spawn: '#ef6c00'
    base: '#5c6bc0'
  obstacles:
    - { type: rock, row: 1, col: 5 }
    - { type: rock, row: 7, col: 12 }
    - { type: cactus, row: 2, col: 10 }
    - { type: cactus, row: 6, col: 16 }
  spawns:
    - id: spawn_0
      row: 4
      col: 0
  pathGraph:
    nodes:
      - { id: n0, row: 4, col: 0, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 4, col: 7, role: waypoint }
      - { id: n2, row: 3, col: 7, role: waypoint }
      - { id: n3, row: 3, col: 13, role: waypoint }
      - { id: n4, row: 4, col: 13, role: waypoint }
      - { id: n5, row: 4, col: 20, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }
      - { from: n1, to: n2 }
      - { from: n2, to: n3 }
      - { from: n3, to: n4 }
      - { from: n4, to: n5 }

weather:
  pool:
    - Sunny
  initial: Sunny

crystal:
  hp: 700

starting:
  gold: 250
  energy: 50
  maxPopulation: 8

available:
  towers:
    - arrow
    - cannon
    - fire
    - poison
  units:
    - archer
    - mage

waves:
  # 波次1: 黑虫×12
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: desert_beetle, count: 12, spawnInterval: 1.0 }
    reward: 25
  # 波次2: 黑虫×8 + 钻地甲虫×3
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 8, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 1.5 }
    reward: 35
  # 波次3: 黑虫×8 + 钻地甲虫×3 + 蝗虫×5
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 8, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 1.5 }
      - { enemyType: locust, count: 5, spawnInterval: 1.5 }
    reward: 45
  # 波次4: 黑虫×10 + 钻地甲虫×4 + 蝗虫×4 + 自爆甲虫×3
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 10, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 4, spawnInterval: 1.5 }
      - { enemyType: locust, count: 4, spawnInterval: 1.5 }
      - { enemyType: bomb_beetle, count: 3, spawnInterval: 1.5 }
    reward: 55
  # 波次5: 黑虫×12 + 钻地甲虫×5 + 蝗虫×6 + 自爆甲虫×4
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 12, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 5, spawnInterval: 1.5 }
      - { enemyType: locust, count: 6, spawnInterval: 1.5 }
      - { enemyType: bomb_beetle, count: 4, spawnInterval: 1.5 }
    reward: 65
  # 波次6: BOSS + 黑虫×8 + 自爆甲虫×3
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: queen_beetle, count: 1, spawnInterval: 0 }
      - { enemyType: desert_beetle, count: 8, spawnInterval: 2.0 }
      - { enemyType: bomb_beetle, count: 3, spawnInterval: 2.0 }
    isBossWave: true
    reward: 100

cardPool:
