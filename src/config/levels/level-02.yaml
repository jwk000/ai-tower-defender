    - [base, path, path, path, path, path, path, path, path, path, path, path, path, path, path, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#bf9e3a'
    path: '#9e8438'
    blocked: '#795548'
    spawn: '#b85a10'
    base: '#4a589e'
  obstacles:
    - { type: rock, row: 0, col: 3 }
    - { type: rock, row: 0, col: 5 }
    - { type: rock, row: 1, col: 12 }
    - { type: rock, row: 3, col: 16 }
    - { type: rock, row: 7, col: 18 }
    - { type: rock, row: 8, col: 18 }
    - { type: cactus, row: 0, col: 19 }
    - { type: cactus, row: 1, col: 3 }
    - { type: cactus, row: 5, col: 17 }
    - { type: cactus, row: 6, col: 15 }
    - { type: cactus, row: 7, col: 16 }
    - { type: cactus, row: 8, col: 8 }
    - { type: bones, row: 1, col: 8 }
    - { type: bones, row: 3, col: 5 }
    - { type: bones, row: 7, col: 15 }
    - { type: bones, row: 8, col: 2 }
    - { type: sand_dune, row: 0, col: 12 }
    - { type: sand_dune, row: 5, col: 4 }
    - { type: sand_dune, row: 8, col: 13 }
    - { type: tunnel_entrance, row: 3, col: 1 }
    - { type: tunnel_exit, row: 7, col: 19 }
  spawns:
    - id: spawn_0
      row: 1
      col: 20
  pathGraph:
    nodes:
      - { id: n0, row: 1, col: 20, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 1, col: 14, role: waypoint }
      - { id: n2, row: 3, col: 14, role: waypoint }
      - { id: n3, row: 3, col: 6, role: waypoint }
      - { id: n4, row: 5, col: 6, role: waypoint }
      - { id: n5, row: 5, col: 14, role: waypoint }
      - { id: n6, row: 7, col: 14, role: waypoint }
      - { id: n7, row: 7, col: 0, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }
      - { from: n1, to: n2 }
      - { from: n2, to: n3 }
      - { from: n3, to: n4 }
      - { from: n4, to: n5 }
      - { from: n5, to: n6 }
      - { from: n6, to: n7 }

weather:
  pool:
    - Sunny
  initial: Sunny

crystal:
  hp: 700

starting:
  gold: 250
  energy: 50
  maxPopulation: 8

available:
  towers:
    - arrow
    - cannon
    - fire
    - poison
  units:
    - archer
    - mage

waves:
  # 波次1: 黑虫×6 + 钻地甲虫(精英)×3
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: desert_beetle, count: 6, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 2.0 }
    reward: 25
  # 波次2: 黑虫×8 + 钻地甲虫(精英)×3
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 8, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 1.5 }
    reward: 35
  # 波次3: 黑虫×8 + 钻地甲虫(精英)×3 + 蝗虫(精英)×5
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 8, spawnInterval: 1.5 }
      - { enemyType: burrow_beetle, count: 3, spawnInterval: 1.5 }
      - { enemyType: locust, count: 5, spawnInterval: 1.5 }
    reward: 45
  # 波次4: 黑虫×10 + 蝗虫(精英)×4 + 自爆甲虫(精英)×3
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 10, spawnInterval: 1.5 }
      - { enemyType: locust, count: 4, spawnInterval: 1.5 }
      - { enemyType: bomb_beetle, count: 3, spawnInterval: 1.5 }
    reward: 55
  # 波次5: 黑虫×12 + 蝗虫(精英)×6 + 自爆甲虫(精英)×4
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: desert_beetle, count: 12, spawnInterval: 1.5 }
      - { enemyType: locust, count: 6, spawnInterval: 1.5 }
      - { enemyType: bomb_beetle, count: 4, spawnInterval: 1.5 }
    reward: 65
  # 波次6: BOSS蜂后(精英)×1 + 黑虫×8 + 自爆甲虫(精英)×3
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: queen_beetle, count: 1, spawnInterval: 0 }
      - { enemyType: desert_beetle, count: 8, spawnInterval: 2.0 }
      - { enemyType: bomb_beetle, count: 3, spawnInterval: 2.0 }
    isBossWave: true
    reward: 100

