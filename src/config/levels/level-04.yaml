# ============================================================
# 第4关：末日废土
# 路径布局：葫芦形（3出生口，中间直线，两边分叉→合并→再分叉→再合并）
# 出生口：上方(行1,列20) / 中间(行4,列20) / 下方(行7,列20) | 水晶：中左(行4,列0)
# 上路径：行1左→列16下→行3左→列14下→列12上→行2左→列8下→行4左→水晶
# 中路径：行4直线从右到左→水晶
# 下路径：行7左→列16上→行5左→列14上→列12下→行6左→列8上→行4左→水晶
# 第一葫芦肚(右)：3路在列12-14汇合 → 窄颈(列8-12) → 第二葫芦肚(左)：分叉再汇合于水晶
# ============================================================
id: level_04
name: 末日废土
theme: wasteland
description: 废弃城市，红雾笼罩，远方淡黑山影层叠，最大山峰冒着黑烟

