    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, empty, empty, empty, path, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, path, empty, path, path, path, empty, empty, empty, empty]
    - [base, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, path, empty, path, path, path, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, path, empty, empty, empty, path, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, path, path, path, path, spawn]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#4e342e'
    path: '#5d4037'
    blocked: '#1a0000'
    spawn: '#cc4518'
    base: '#546e7a'
  obstacles:
    - { type: rubble, row: 0, col: 8 }
    - { type: rubble, row: 1, col: 2 }
    - { type: rubble, row: 3, col: 17 }
    - { type: rubble, row: 7, col: 3 }
    - { type: rubble, row: 8, col: 12 }
    - { type: rubble, row: 8, col: 19 }
    - { type: pillar, row: 0, col: 15 }
    - { type: pillar, row: 1, col: 18 }
    - { type: pillar, row: 5, col: 2 }
    - { type: pillar, row: 6, col: 5 }
    - { type: pillar, row: 7, col: 15 }
    - { type: car, row: 1, col: 8 }
    - { type: car, row: 2, col: 3 }
    - { type: car, row: 5, col: 13 }
    - { type: car, row: 8, col: 6 }
    - { type: scorched_tree, row: 0, col: 4 }
    - { type: scorched_tree, row: 3, col: 13 }
    - { type: scorched_tree, row: 7, col: 9 }
    - { type: scorched_tree, row: 8, col: 17 }
    - { type: volcanic_rock, row: 2, col: 6 }
    - { type: volcanic_rock, row: 3, col: 3 }
    - { type: volcanic_rock, row: 6, col: 7 }
  spawns:
    - id: spawn_0
      row: 1
      col: 20
    - id: spawn_1
      row: 4
      col: 20
    - id: spawn_2
      row: 7
      col: 20
  pathGraph:
    nodes:
      # 上方路径(spawn_0): 分叉→汇合→再分叉→汇合水晶
      - { id: n0, row: 1, col: 20, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 1, col: 16, role: waypoint }
      - { id: n2, row: 3, col: 16, role: waypoint }
      - { id: n3, row: 3, col: 14, role: waypoint }
      - { id: n4, row: 4, col: 14, role: waypoint }
      - { id: n5, row: 4, col: 12, role: waypoint }
      - { id: n6, row: 2, col: 12, role: waypoint }
      - { id: n7, row: 2, col: 8, role: waypoint }
      - { id: n8, row: 4, col: 8, role: waypoint }
      # 中间路径(spawn_1): 直线
      - { id: n9, row: 4, col: 20, role: spawn, spawnId: spawn_1 }
      - { id: n10, row: 4, col: 12, role: waypoint }
      - { id: n11, row: 4, col: 8, role: waypoint }
      # 下方路径(spawn_2): 分叉→汇合→再分叉→汇合水晶
      - { id: n12, row: 7, col: 20, role: spawn, spawnId: spawn_2 }
      - { id: n13, row: 7, col: 16, role: waypoint }
      - { id: n14, row: 5, col: 16, role: waypoint }
      - { id: n15, row: 5, col: 14, role: waypoint }
      - { id: n16, row: 4, col: 14, role: waypoint }
      - { id: n17, row: 4, col: 12, role: waypoint }
      - { id: n18, row: 6, col: 12, role: waypoint }
      - { id: n19, row: 6, col: 8, role: waypoint }
      - { id: n20, row: 4, col: 8, role: waypoint }
      # 水晶（三路共用）
      - { id: n21, row: 4, col: 0, role: crystal_anchor }
    edges:
      # 上方路径
      - { from: n0, to: n1 }
      - { from: n1, to: n2 }
      - { from: n2, to: n3 }
      - { from: n3, to: n4 }
      - { from: n4, to: n5 }
      - { from: n5, to: n6 }
      - { from: n6, to: n7 }
      - { from: n7, to: n8 }
      - { from: n8, to: n21 }
      # 中间路径
      - { from: n9, to: n10 }
      - { from: n10, to: n11 }
      - { from: n11, to: n21 }
      # 下方路径
      - { from: n12, to: n13 }
      - { from: n13, to: n14 }
      - { from: n14, to: n15 }
      - { from: n15, to: n16 }
      - { from: n16, to: n17 }
      - { from: n17, to: n18 }
      - { from: n18, to: n19 }
      - { from: n19, to: n20 }
      - { from: n20, to: n21 }

