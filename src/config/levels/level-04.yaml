id: level_04
name: 末日废土
description: 废弃城市，浓雾弥漫

map:
  cols: 21
  rows: 9
  tileSize: 64
  tiles:
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, path, empty, empty, empty, path, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, path, empty, empty, empty, path, empty, empty, empty, empty, empty, empty, empty, empty]
    - [spawn, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, path, base]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    - [empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
  tileColors:
    empty: '#4e342e'
    path: '#5d4037'
    blocked: '#1a0000'
    spawn: '#ff5722'
    base: '#546e7a'
  obstacles:
    - { type: rubble, row: 0, col: 8 }
    - { type: car, row: 5, col: 10 }
    - { type: pillar, row: 6, col: 15 }
  spawns:
    - id: spawn_0
      row: 2
      col: 0
    - id: spawn_1
      row: 4
      col: 0
  pathGraph:
    nodes:
      - { id: n0, row: 2, col: 0, role: spawn, spawnId: spawn_0 }
      - { id: n1, row: 2, col: 8, role: waypoint }
      - { id: n2, row: 2, col: 12, role: waypoint }
      - { id: n3, row: 2, col: 20, role: crystal_anchor }
      - { id: n4, row: 4, col: 0, role: spawn, spawnId: spawn_1 }
      - { id: n5, row: 4, col: 12, role: waypoint }
      - { id: n6, row: 4, col: 20, role: crystal_anchor }
    edges:
      - { from: n0, to: n1 }
      - { from: n1, to: n2 }
      - { from: n2, to: n3 }
      - { from: n4, to: n5 }
      - { from: n5, to: n6 }

weather:
  pool:
    - Fog
  initial: Fog

crystal:
  hp: 1200

starting:
  gold: 350
  energy: 50
  maxPopulation: 12

available:
  towers:
    - missile
    - lightning
    - cannon
    - ice
  units:
    - archer
    - mage

waves:
  # 波次1: 机器狗×8
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: robot_dog, count: 8, spawnInterval: 1.5 }
    reward: 35
  # 波次2: 机器狗×6 + 无人机×5
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 6, spawnInterval: 1.5 }
      - { enemyType: drone, count: 5, spawnInterval: 1.5 }
    reward: 45
  # 波次3: 机器狗×5 + 无人机×4 + 飞机×2
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 5, spawnInterval: 2.0 }
      - { enemyType: drone, count: 4, spawnInterval: 2.0 }
      - { enemyType: plane, count: 2, spawnInterval: 2.0 }
    reward: 55
  # 波次4: 机器狗×4 + 无人机×3 + 飞机×2 + 油罐车×2
  - waveNumber: 4
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 4, spawnInterval: 2.0 }
      - { enemyType: drone, count: 3, spawnInterval: 2.0 }
      - { enemyType: plane, count: 2, spawnInterval: 2.0 }
      - { enemyType: oil_truck, count: 2, spawnInterval: 2.0 }
    reward: 65
  # 波次5: 机器狗×4 + 无人机×4 + 飞机×2 + 油罐车×2 + 坦克×1
  - waveNumber: 5
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 4, spawnInterval: 2.0 }
      - { enemyType: drone, count: 4, spawnInterval: 2.0 }
      - { enemyType: plane, count: 2, spawnInterval: 2.0 }
      - { enemyType: oil_truck, count: 2, spawnInterval: 2.0 }
      - { enemyType: tank, count: 1, spawnInterval: 2.0 }
    reward: 75
  # 波次6: 机器狗×3 + 无人机×3 + 飞机×2 + 油罐车×2 + 坦克×2 + 巨型机器人×1
  - waveNumber: 6
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 3, spawnInterval: 2.0 }
      - { enemyType: drone, count: 3, spawnInterval: 2.0 }
      - { enemyType: plane, count: 2, spawnInterval: 2.0 }
      - { enemyType: oil_truck, count: 2, spawnInterval: 2.0 }
      - { enemyType: tank, count: 2, spawnInterval: 2.0 }
      - { enemyType: giant_robot, count: 1, spawnInterval: 2.0 }
    reward: 85
  # 波次7: 机器狗×5 + 无人机×4 + 飞机×3 + 油罐车×3 + 坦克×2
  - waveNumber: 7
    spawnDelay: 30
    enemies:
      - { enemyType: robot_dog, count: 5, spawnInterval: 2.0 }
      - { enemyType: drone, count: 4, spawnInterval: 2.0 }
      - { enemyType: plane, count: 3, spawnInterval: 2.0 }
      - { enemyType: oil_truck, count: 3, spawnInterval: 2.0 }
      - { enemyType: tank, count: 2, spawnInterval: 2.0 }
    reward: 95
  # 波次8: BOSS + 无人机×5 + 坦克×2
  - waveNumber: 8
    spawnDelay: 30
    enemies:
      - { enemyType: super_robot, count: 1, spawnInterval: 0 }
      - { enemyType: drone, count: 5, spawnInterval: 2.0 }
      - { enemyType: tank, count: 2, spawnInterval: 2.0 }
    isBossWave: true
    reward: 150

