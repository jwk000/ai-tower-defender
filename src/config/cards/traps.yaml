spike_trap_card:
  name: 地刺
  description: 在路径上铺设地刺，敌人踩中受伤
  type: trap
  rarity: common
  energyCost: 2
  unitConfigId: spike_trap
  placement:
    targetType: tile
    range: path

bear_trap_card:
  name: 捕兽夹
  description: 一次性陷阱，眩晕敌人2秒并造成20点伤害，BOSS免疫
  type: trap
  rarity: common
  energyCost: 3
  unitConfigId: bear_trap
  placement:
    targetType: tile
    range: path

tar_pit_card:
  name: 焦油坑
  description: 路径减速陷阱，经过的敌人减速20%
  type: trap
  rarity: common
  energyCost: 2
  unitConfigId: tar_pit
  placement:
    targetType: tile
    range: path

boulder_card:
  name: 巨石
  description: 路障，阻挡敌人前进直到被破坏
  type: trap
  rarity: rare
  energyCost: 4
  unitConfigId: boulder
  placement:
    targetType: tile
    range: path

fan_card:
  name: 风扇
  description: 前方3格路径上的敌人减速20%
  type: trap
  rarity: rare
  energyCost: 3
  unitConfigId: fan
  placement:
    targetType: tile
    range: path_adjacent

water_pit_card:
