# ============================================================
# Tower Defender — 法术卡配置 (B3-MVP)
# ============================================================
# 设计文档:
#   - design/25-card-roguelike-refactor.md §2 卡牌系统（spell 即用即弃）
#   - design/03-unit-data.md §8 卡牌目录
#   - design/21-mda-numerical-design.md §12.2 卡牌能量消耗表
#
# 字段约定见 src/config/cardRegistry.ts: CardConfig
# spellEffect 字段被 SpellSystem.executeSpell 消费（src/unit-system/SpellSystem.ts）

fireball_card:
  name: 火球术
  description: 在指定位置爆出一团火焰，对范围内敌人造成 80 点伤害
  type: spell
  rarity: common
  energyCost: 3
  goldCost: 40
  spellSubtype: damage
  placement:
    targetType: area
    range: cursor
  spellEffect:
    handler: aoe_damage
    damage: 80
    radius: 80
    affectAlly: false

arrow_rain_card:
  name: 剑雨
  description: 对3x3区域内的敌人造成25点伤害
  type: spell
  rarity: common
  energyCost: 3
  goldCost: 45
  spellSubtype: damage
  placement:
    targetType: area
    range: cursor
  spellEffect:
    handler: aoe_damage
    damage: 25
    radius: 128
    affectAlly: false

blizzard_card:
  name: 暴风雪
  description: 对3x3区域内敌人造成15点伤害并减速5秒
  type: spell
  rarity: rare
  energyCost: 4
  goldCost: 55
  spellSubtype: control
  placement:
    targetType: area
    range: cursor
  spellEffect:
    handler: aoe_damage_slow
    damage: 15
    radius: 128
    slowPercent: 30
    slowDuration: 5.0
    affectAlly: false

bomb_card:
  name: 炸弹
  description: 放置后2秒爆炸，对范围内敌人造成80点伤害
  type: spell
  rarity: rare
  energyCost: 4
  goldCost: 60
  spellSubtype: damage
  placement:
    targetType: area
    range: cursor
  spellEffect:
    handler: delayed_aoe
    damage: 80
    radius: 96
    delay: 2.0
    affectAlly: false

earthquake_card:
  name: 大地裂变
  description: 全棋盘震动，3秒内每秒对所有敌人造成100点物理伤害
  type: spell
  rarity: epic
  energyCost: 6
  goldCost: 140
  spellSubtype: damage
  placement:
    targetType: global
  spellEffect:
    handler: global_dot_damage
    damagePerTick: 100
    tickInterval: 1.0
    duration: 3.0
    damageType: physical
    affectAlly: false

gold_rush_card:
  name: 淘金热
  description: 立即获得80金币
  type: spell
  rarity: common
  energyCost: 0
  goldCost: 20
  spellSubtype: utility
  placement:
    targetType: global
  spellEffect:
    handler: gain_gold
    amount: 80
