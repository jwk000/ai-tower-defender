gold_mine_card:
  name: 金矿
  description: 每秒产出金币，长期收益建筑
  type: production
  rarity: rare
  energyCost: 3
  unitConfigId: gold_mine
  placement:
    targetType: tile
  upgrades:
    - level: 2
      goldCost: 70
      title: 金矿 Lv.2
      description: 产金效率提升，滚雪球更快。
    - level: 3
      goldCost: 110
      title: 金矿 Lv.3
      description: 进一步强化经济产出，适合建筑流后期成型。

energy_crystal_card:
  name: 能量水晶
  description: 每秒回复能量，长期收益建筑
  type: production
  rarity: rare
  energyCost: 4
  unitConfigId: energy_crystal
  placement:
    targetType: tile
